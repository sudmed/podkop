name: Update Win-Spy Ruleset

on:
  schedule:
    - cron: '0 3 * * *' # Запускать каждый день в 03:00 UTC
  workflow_dispatch: # Кнопка для ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Run converter script
        run: python convert.py

      - name: Install compatible sing-box compiler
        run: |
          # Скачиваем официальный sing-box версии 1.9.3
          # Он генерирует бинарники, на 100% совместимые с hiddify-core v4.1.0
          wget -O sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v1.9.3/sing-box-1.9.3-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          
          # Копируем бинарник в систему
          sudo cp sing-box-*/sing-box /usr/local/bin/
          sing-box version

      - name: Compile JSON to SRS (Binary)
        run: |
          # Используем стандартную команду компиляции
          sing-box rule-set compile win-spy.json -o win-spy.srs

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Добавляем оба файла: и текстовый, и бинарный
          git add win-spy.json win-spy.srs
          
          git commit -m "Auto-update win-spy ruleset (JSON + SRS)" || echo "No changes to commit"
          git push || echo "No changes to push"
